{% extends "base.html" %}

{% block title %}Login - PayVerify Nepal{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto;">
    <div style="background: white; border-radius: 16px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);">
        <h2 style="text-align:center; margin-bottom: 30px; font-size: 28px;">Welcome Back 👋</h2>
        <p style="text-align:center; color:#666; margin-bottom: 25px;">Login to your PayVerify account</p>

        {% if error %}
        <div style="background:#fde8ea; color:#dc3545; padding:12px; border-radius:8px; margin-bottom:20px; text-align:center;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div style="margin-bottom: 18px;">
                <label style="display:block; font-weight:600; margin-bottom:5px;">Username</label>
                <input type="text" name="username" placeholder="Enter your username" required style="width:100%; padding:12px; border:2px solid #ddd; border-radius:8px; font-size:16px;">
            </div>
            <div style="margin-bottom: 25px;">
                <label style="display:block; font-weight:600; margin-bottom:5px;">Password</label>
                <input type="password" name="password" placeholder="Enter your password" required style="width:100%; padding:12px; border:2px solid #ddd; border-radius:8px; font-size:16px;">
            </div>
            <button type="submit" style="width:100%; padding:14px; background:linear-gradient(135deg, #667eea, #764ba2); color:white; border:none; border-radius:8px; font-size:18px; font-weight:bold; cursor:pointer;">
                Login
            </button>
        </form>

        <p style="text-align:center; margin-top:20px; color:#666;">
            Don't have an account? <a href="/signup" style="color:#667eea; font-weight:bold; text-decoration:none;">Sign Up</a>
        </p>
    </div>
</div>
{% endblock %}
