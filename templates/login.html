{% extends "base.html" %}

{% block title %}Login - PayVerify Nepal{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto;">
    <div style="background: var(--dark-card); border-radius: 16px; padding: 40px; border: 1px solid rgba(0, 212, 255, 0.08); box-shadow: var(--shadow-glow);">
        <h2 style="text-align:center; margin-bottom: 30px; font-size: 28px; color: var(--text-primary);">Welcome Back 👋</h2>
        <p style="text-align:center; color: var(--text-secondary); margin-bottom: 25px;">Login to your PayVerify account</p>

        {% if error %}
        <div style="background:rgba(255,0,64,0.1); color:var(--neon-red); padding:12px; border-radius:8px; margin-bottom:20px; text-align:center; border-left:4px solid var(--neon-red);">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div style="background:rgba(0,255,65,0.1); color:var(--neon-green); padding:12px; border-radius:8px; margin-bottom:20px; text-align:center; border-left:4px solid var(--neon-green);">
            <i class="fas fa-check-circle"></i> {{ success }}
        </div>
        {% endif %}

        <form method="POST">
            <div style="margin-bottom: 18px;">
                <label style="display:block; font-weight:600; margin-bottom:5px; color: var(--text-primary);">Username</label>
                <input type="text" name="username" placeholder="Enter your username" required style="width:100%; padding:12px; background:var(--dark-bg); border:1px solid rgba(0,212,255,0.1); border-radius:8px; font-size:16px; color:var(--text-primary);">
            </div>
            <div style="margin-bottom: 25px;">
                <label style="display:block; font-weight:600; margin-bottom:5px; color: var(--text-primary);">Password</label>
                <input type="password" name="password" placeholder="Enter your password" required style="width:100%; padding:12px; background:var(--dark-bg); border:1px solid rgba(0,212,255,0.1); border-radius:8px; font-size:16px; color:var(--text-primary);">
            </div>
            <button type="submit" style="width:100%; padding:14px; background:linear-gradient(135deg, var(--primary), var(--secondary)); color:white; border:none; border-radius:8px; font-size:18px; font-weight:bold; cursor:pointer; transition: all 0.3s ease;">
                Login
            </button>
        </form>

        <p style="text-align:center; margin-top:20px; color: var(--text-secondary);">
            Don't have an account? <a href="/signup" style="color:var(--primary); font-weight:bold; text-decoration:none;">Sign Up</a>
        </p>
    </div>
</div>
{% endblock %}
